services:
  db:
    image: postgres:16-alpine
    container_name: dungeon-master-db
    environment:
      POSTGRES_USER: dm_user
      POSTGRES_PASSWORD: dm_pass
      POSTGRES_DB: dungeon_master
    ports:
      - "5432:5432"
    volumes:
      - dm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dm_user -d dungeon_master"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dm_pgdata: